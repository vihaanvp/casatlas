<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect x="40" y="40" width="1120" height="550" rx="24" stroke="#10b981" stroke-width="2" opacity="0.15"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Globe -->
  <circle cx="600" cy="240" r="120" stroke="#10b981" stroke-width="3" fill="none"/>
  <ellipse cx="600" cy="240" rx="60" ry="120" stroke="#10b981" stroke-width="1.5" fill="none" opacity="0.5"/>
  <ellipse cx="600" cy="240" rx="90" ry="120" stroke="#10b981" stroke-width="1" fill="none" opacity="0.3"/>
  <line x1="480" y1="240" x2="720" y2="240" stroke="#10b981" stroke-width="1.5" opacity="0.3"/>
  <path d="M500 200 Q600 175 700 200" stroke="#10b981" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M500 280 Q600 305 700 280" stroke="#10b981" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- Title -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#ffffff" letter-spacing="-1">CASAtlas</text>
  <text x="600" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#10b981" letter-spacing="6">OPEN-SOURCE CAS PORTFOLIO</text>

  <!-- Bottom tagline -->
  <text x="600" y="520" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#71717a">Next.js  ·  PostgreSQL  ·  Prisma  ·  Docker  ·  Auth.js</text>
</svg>
